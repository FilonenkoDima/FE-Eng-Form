<form [formGroup]="form" (ngSubmit)="onSubmit()">
  <h2>Frontend Engineer Form</h2>

  <div>
    <label for="name">Name</label>
    <input type="text" id="name" name="name" formControlName="name">
    @if (nameIsInvalid) {
      <p>Please enter a valid name.</p>
    }
  </div>

  <div>
    <label for="lastName">Last Name</label>
    <input type="text" id="lastName" name="lastName" formControlName="lastName">

    @if (lastNameIsInvalid) {
      <p>Please enter a valid last name.</p>
    }
  </div>

  <div>
    <mat-form-field>
      <mat-label>Choose a date</mat-label>
      <input matInput [matDatepicker]="picker" [formControl]="form.controls.dateOfBirth">
      <mat-hint>MM/DD/YYYY</mat-hint>
      <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
      <mat-datepicker #picker></mat-datepicker>
    </mat-form-field>
    @if (dateOfBirthIsInvalid) {
      <p>Please enter a valid date of birth.</p>
    }
  </div>

  <button>Send</button>

</form>
